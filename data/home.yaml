products_section:
  label: "Catálogo"
  title: "Nossos Produtos"
  subtitle: "Linha completa de produtos para atender todas as demandas da sua operação com qualidade e procedência garantida."
  button_text: "Ver Todos os Produtos"
  button_url: "/produtos/"
  items:
    - tag: "Geradores"
      title: "Locação de geradores de energia"
      text: "Conheça nosso estoque de geradores de energia para locação, ideais para eventos, obras e emergências. Oferecemos equipamentos confiáveis, eficientes e com suporte técnico especializado para garantir o fornecimento contínuo de energia onde você precisar."
      image: "/images/gerador-transporte.jpg"
      image_alt: "Gerador Industrial"
      link_url: "/produtos/geradores"
    - tag: "Quadros Elétricos"
      title: "Quadros de transferência automática"
      text: "Solicite informações sobre nossos quadros de transferência automática disponíveis para locação. Nossos quadros garantem a continuidade do fornecimento de energia, com comutação rápida e segura entre fontes primárias e secundárias, ideais para obras, eventos e situações de emergência."
      image: "/images/QTA-image2.jpg"
      image_alt: "Quadro de Transferência Automática"
      link_url: "/produtos/"
    - tag: "Controladores"
      title: "Painel de controle HMI"
      text: "Painel de controle HMI para geradores, oferecendo monitoramento em tempo real, controle intuitivo e fácil acesso a informações críticas. Ideal para garantir a operação eficiente e segura dos seus geradores de energia."
      image: "/images/painel-image.jpeg"
      image_alt: "Painel de Controle HMI"
      link_url: "/produtos/"
    - tag: "Controladores"
      title: "Controlador de rede"
      text: "Conheça nosso controlador de rede da marca Deep Sea, ideal para monitoramento e controle avançado de geradores. Oferece recursos de comunicação, proteção e gerenciamento de energia para garantir a operação eficiente e segura dos seus sistemas de geração."
      image: "/images/controladorrede-image.jpeg"
      image_alt: "Controlador de Rede"
      link_url: "/produtos/"
    - tag: "Controladores"
      title: "Controlador de gerador"
      text: "Conheça nosso controlador de gerador da marca Deif, para sincronismo e paralelismo. Oferece recursos avançados de monitoramento, controle e proteção para garantir a operação eficiente e segura dos seus sistemas de geração de energia."
      image: "/images/controlador-image.jpeg"
      image_alt: "Controlador de Gerador"
      link_url: "/produtos/"
    - tag: "Eletronica"
      title: "Regulador automático de tensão"
      text: "Conheça nosso estoque de reguladores automáticos de tensão, essenciais para proteger seus equipamentos contra variações de energia. Oferecemos soluções confiáveis e eficientes para garantir a estabilidade da tensão em suas operações industriais e comerciais."
      image: "/images/reguladorautomatico-image.jpeg"
      image_alt: "Regulador Automático de Tensão"
      link_url: "/produtos/"

services_section:
  label: "O que fazemos"
  title: "Nossos Serviços"
  subtitle: "Oferecemos uma gama de serviços especializados para maximizar a produtividade e eficiência da sua empresa."
  button_text: "Ver Todos os Serviços"
  button_url: "/servicos/"
  items:
    - title: "Manutenção Corretiva e preventiva"
      text: "Manutenção em grupos geradores. Garantindo a operação contínua e confiável dos seus equipamentos, minimizando paradas e maximizando a eficiência energética."
      icon: "manutencao"
    - title: "Projetos Elétricos e Consultoria Técnica"
      text: "Projetos elétricos para subestações e grupos geradores. Consultoria técnica especializada para otimizar a performance e segurança dos seus sistemas de energia."
      icon: "manutencao"
    - title: "Instalação e Montagem de geradores e subestações"
      text: "Instalação e montagem de grupos geradores e subestações. Serviços completos para garantir a correta instalação, configuração e operação dos seus equipamentos, com foco em segurança e eficiência."
      icon: "instalacao"
    - title: "Medições e Laudos elétricos"
      text: "Medições e laudos elétricos para garantir a conformidade e segurança dos seus sistemas. Avaliações técnicas detalhadas para identificar e corrigir possíveis falhas, assegurando a integridade dos seus equipamentos e a segurança do ambiente de trabalho."
      icon: "treinamento"

