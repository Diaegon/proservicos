hero:
  title: "Nossos Serviços"
  subtitle: "Soluções técnicas especializadas para maximizar a eficiência e produtividade da sua empresa."

items:
  - icon: "manutencao"
    tag: "Manutenção"
    title: "Manutenção Preventiva e Corretiva em grupos Geradores e Subestações"
    paragraphs:
      - "15 anos de experiência em manutenção de grupos geradores e subestações em todo o país. Serviços completos para garantir a operação contínua e confiável dos seus equipamentos, minimizando paradas e maximizando a eficiência energética."
      - "Atuamos com uma equipe técnica altamente qualificada, utilizando as melhores práticas e tecnologias do mercado para oferecer soluções de manutenção personalizadas, adaptadas às necessidades específicas de cada cliente."
    features:
      - "Análise diagnóstica completa da operação"
      - "Relatório técnico detalhado com recomendações"
      - "Acompanhamento de implementação das melhorias"
      - "Suporte contínuo pós-consultoria"
    button_text: "Solicitar Consultoria"
    button_url: "/contato/"
    reverse: false
    image: "/images/gerador-image.jpg"
    image_alt: "Manutenção de Geradores e subestações"
  - icon: "manutencao"
    tag: "Projetos e Consultoria"
    title: "Projetos Elétricos e Consultoria Técnica para Grupos Geradores e Subestações"
    paragraphs:
      - "Com 15 anos de experiência em projetos elétricos para grupos geradores e subestações, oferecemos consultoria técnica especializada para otimizar a performance e segurança dos seus sistemas de energia. Nossos serviços abrangem desde o planejamento e dimensionamento até a implementação e acompanhamento, garantindo soluções personalizadas que atendem às necessidades específicas de cada cliente."
    features:
      - "Projetos elétricos personalizados para subestações e grupos geradores"
      - "Equipe técnica certificada e experiente"
      - "Relatórios de manutenção e rastreabilidade"
      - "Atendimento de emergência 24 horas"
    button_text: "Contratar Manutenção"
    button_url: "/contato/"
    reverse: true
    image: "/images/gerador-image3.jpg"
    image_alt: "Projetos e Consultoria Técnica"
  - icon: "instalacao"
    tag: "Laudos e Instalação"
    title: "Medições, Laudos Elétricos e Instalação de Paineis de transferência automática"
    paragraphs:
      - "Oferecemos serviços completos de medições, laudos elétricos e instalação de painéis de transferência automática para garantir a conformidade, segurança e eficiência dos seus sistemas de energia. Nossos serviços incluem avaliações técnicas detalhadas, relatórios de conformidade e soluções personalizadas para atender às necessidades específicas de cada cliente."
      
    features:
      - "Projeto de instalação com ART/RRT"
      - "Montagem conforme normas técnicas vigentes"
      - "Comissionamento e testes de aceitação"
      - "Treinamento operacional da equipe cliente"
    button_text: "Solicitar Instalação"
    button_url: "/contato/"
    reverse: false
    image: "/images/QTA-image2.jpg"
    image_alt: "Instalação e Montagem"
  - icon: "treinamento"
    tag: "Renováveis"
    title: "Projeto e instalação de sistemas Solares Fotovoltaicos"
    paragraphs:
      - "Possuimos também soluções em energia renovável, com projetos e instalações de sistemas fotovoltaicos para geração de energia limpa e sustentável. Nossos serviços incluem desde a análise de viabilidade e dimensionamento até a instalação e manutenção, garantindo soluções personalizadas que atendem às necessidades específicas de cada cliente."
      
    features:
      - "Projeto Elétrico com responsável técnico"
      - "Instalação com equipe especializada"
      - "Equipamentos de alta eficiência, garantia e durabilidade"
      - "Homologação junto à concessionária de energia"
    button_text: "Solicitar Orçamento"
    button_url: "/contato/"
    reverse: true
    image: "/images/solar-image.jpeg"
    image_alt: "Treinamento e Capacitação"
  - icon: "locacao"
    tag: "Locação"
    title: "Locação de Equipamentos"
    paragraphs:
      - "Locação de grupos geradores, QTA (Painéis de transferência automática) e equipamentos elétricos para atender às necessidades temporárias da sua empresa. Oferecemos uma ampla variedade de equipamentos revisados e certificados, com contratos flexíveis (diária, semanal ou mensal), entrega e retirada no local, além de suporte técnico durante todo o período de locação."
    features:
      - "Equipamentos revisados e certificados"
      - "Contratos flexíveis: diária, semanal ou mensal"
      - "Entrega e retirada no local"
      - "Projeto, Instalação e Suporte técnico durante todo o período"
    button_text: "Solicitar Locação"
    button_url: "/contato/"
    reverse: false
    image: "/images/gerador-image2.jpg"
    image_alt: "Locação de Equipamentos"

