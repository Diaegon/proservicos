values_section:
  label: "Cultura Organizacional"
  title: "Missão, Visão e Valores"
  subtitle: "Os princípios que orientam cada decisão e cada entrega que fazemos aos nossos clientes."
  items:
    - icon: "🎯"
      title: "Nossa Missão"
      text: "Oferecer soluções completas em energia com qualidade, segurança e eficiência, por meio da venda e locação de geradores, manutenção elétrica especializada e sistemas de energia solar, garantindo confiabilidade operacional e suporte técnico de excelência aos nossos clientes."
    - icon: "🔭"
      title: "Nossa Visão"
      text: "Ser referência regional em soluções energéticas, reconhecida pela confiança, inovação e excelência técnica, ampliando continuamente nossa atuação nos segmentos de geração, manutenção elétrica e energia sustentável."
    - icon: "💎"
      title: "Nossos Valores"
      text: "Ética e transparência em tudo que fazemos. Compromisso com a qualidade, respeito às pessoas, inovação contínua e responsabilidade socioambiental são os pilares da nossa cultura."
