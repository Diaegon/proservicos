hero:
  title: "Sobre a Proservicos"
  subtitle: "Conheça nossa história, missão e os valores que guiam cada decisão que tomamos."

history:
  label: "Nossa História"
  title: "Uma empresa construída sobre confiança e resultados"
  paragraphs:
    - "Há 15 anos no mercado, a Proserviços atua com excelência em soluções para geração e distribuição de energia, oferecendo venda e locação de geradores a diesel, manutenção elétrica especializada em grupos geradores e subestações, além de soluções em energia solar. Ao longo de sua trajetória, a empresa consolidou sua atuação através de um atendimento técnico qualificado, foco em confiabilidade operacional e compromisso com a continuidade energética de seus clientes."
    - "Com experiência em projetos e serviços prestados para grandes empresas de diversos segmentos, a Proserviços se destaca pela agilidade, segurança e capacidade técnica de sua equipe. Mais do que fornecer equipamentos e manutenção, a empresa entrega suporte estratégico e soluções eficientes para garantir desempenho, economia e tranquilidade em operações críticas."
  image: "https://pub-44e4ed4bbd164f789c8c97ac80397277.r2.dev/proservicosweb/images/hero-image.jpg"
  image_alt: "Equipe Proservicos"
  badge_number: "15+"
  badge_label: "Anos de<br>Mercado"
  button_text: "Entre em Contato"
  button_url: "/contato/"

