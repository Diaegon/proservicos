items:
  - tag: "Geradores"
    name: "Locação de geradores de energia"
    desc: "Conheça nosso estoque de geradores de energia para locação, ideais para eventos, obras e emergências. Oferecemos equipamentos confiáveis, eficientes e com suporte técnico especializado para garantir o fornecimento contínuo de energia onde você precisar."
    image: "/images/gerador-transporte.jpg"
    image_alt: "Gerador Industrial"
    code: "PRD-001"
    cta_url: "/produtos/geradores"
  - tag: "Quadros Elétricos"
    name: "Quadros de transferência automatica"
    desc: "Solicite informações sobre nossos quadros de transferência automática disponíveis para locação. Nossos quadros garantem a continuidade do fornecimento de energia, com comutação rápida e segura entre fontes primárias e secundárias, ideais para obras, eventos e situações de emergência."
    image: "/images/QTA-image2.jpg"
    image_alt: "Quadro de Transferência Automática"
    code: "PRD-002"
    cta_url: "/contato/"
  - tag: "Controladores"
    name: "Painel de controle HMI"
    desc: "Painel de controle HMI para geradores, oferecendo monitoramento em tempo real, controle intuitivo e fácil acesso a informações críticas. Ideal para garantir a operação eficiente e segura dos seus geradores de energia."
    image: "/images/painel-image.jpeg"
    image_alt: "Painel de Controle HMI"
    code: "PRD-003"
    cta_url: "/contato/"
  - tag: "Hidraulica"
    name: "Bomba de transferência Cummins"
    desc: "Confira nosso estoque com os melhores preços de bombas de transferência Cummins, ideais para movimentação eficiente de líquidos em diversos setores industriais. Oferecemos equipamentos confiáveis, duráveis e com suporte técnico especializado para garantir o desempenho ideal em suas operações."
    image: "/images/produtos/bombadetransferencia-image.png"
    image_alt: "Bomba de Transferência Cummins"
    code: "PRD-004"
    cta_url: "/contato/"
  - tag: "Eletronica"
    name: "Regulador automático de tensão"
    desc: "Conheça nosso estoque de reguladores automáticos de tensão, essenciais para proteger seus equipamentos contra variações de energia. Oferecemos soluções confiáveis e eficientes para garantir a estabilidade da tensão em suas operações industriais e comerciais."
    image: "/images/reguladorautomatico-image.jpeg"
    image_alt: "Regulador Automático de Tensão"
    code: "PRD-005"
    cta_url: "/contato/"
  - tag: "Elétrica"
    name: "No breaks para equipamentos sensíveis"
    desc: "Encontre no breaks de alta qualidade para proteger seus equipamentos sensíveis contra quedas de energia e surtos. Oferecemos soluções confiáveis e eficientes para garantir a continuidade das operações em ambientes industriais e comerciais."
    image: "/images/nobreak-image.jpeg"
    image_alt: "No break"
    code: "PRD-006"
    cta_url: "/contato/"
  - tag: "Elétrica"
    name: "Diodos retificadores para geradores"
    desc: "Confira nossa linha de diodos retificadores para geradores, essenciais para garantir a eficiência e confiabilidade do sistema de geração de energia. Oferecemos produtos de alta qualidade, ideais para diversas aplicações industriais e comerciais."
